name: Model Kesif (gecici — canli models.list)
# 10 Tem 2026: gemini-2.5-flash 404 vermeye basladi ("no longer available").
# Faz 2: yeni MODEL (gemini-3.5-flash) canli generateContent testi.
# Dogrulama bitince bu dosya SILINECEK.
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: gemini-3.5-flash canli test
        env:
          KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          curl -s -H "x-goog-api-key: $KEY" -H "Content-Type: application/json" \
            -d '{"contents":[{"parts":[{"text":"Reply with exactly: MODEL_OK"}]}]}' \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent" \
          | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if 'error' in d:
              print('HATA:', json.dumps(d['error'])[:300]); raise SystemExit(1)
          metin = d['candidates'][0]['content']['parts'][0]['text']
          print('CEVAP:', metin.strip()[:80])
          print('KULLANIM:', json.dumps(d.get('usageMetadata', {}))[:200])
          "
